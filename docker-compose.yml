services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-willcarlo}
      MARIADB_USER: ${MARIADB_USER:-willcarlo}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-willcarlo}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3307:3306"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WILLCARLO_DATABASE_URL: mysql+pymysql://${MARIADB_USER:-willcarlo}:${MARIADB_PASSWORD:-willcarlo}@db:3306/${MARIADB_DATABASE:-willcarlo}
      WILLCARLO_SIMULATION_COUNT: ${WILLCARLO_SIMULATION_COUNT:-10000}
      WILLCARLO_SIMULATION_SEED: ${WILLCARLO_SIMULATION_SEED:-2026}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
