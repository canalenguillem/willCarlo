server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Activos con hash en el nombre (JS/CSS): inmutables, se pueden cachear para siempre.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: cualquier ruta cae en index.html. El HTML NO se cachea, así que el navegador
    # siempre revalida y recoge el nuevo bundle tras cada build (sin hard refresh).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # /api -> servicio backend dentro de la red de docker-compose
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
